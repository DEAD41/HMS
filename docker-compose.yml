name: healthcare-erp

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: healthcare_erp_foundation
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d healthcare_erp_foundation"]
      interval: 5s
      timeout: 5s
      retries: 20

  api:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Docker
      ASPNETCORE_URLS: http://+:8080
      Database__UseInMemory: "false"
      ConnectionStrings__Foundation: Host=postgres;Port=5432;Database=healthcare_erp_foundation;Username=postgres;Password=postgres
      ConnectionStrings__Hms: Host=postgres;Port=5432;Database=healthcare_erp_hms;Username=postgres;Password=postgres
      ConnectionStrings__Hris: Host=postgres;Port=5432;Database=healthcare_erp_hris;Username=postgres;Password=postgres
      ConnectionStrings__Financials: Host=postgres;Port=5432;Database=healthcare_erp_financials;Username=postgres;Password=postgres
      ConnectionStrings__Inventory: Host=postgres;Port=5432;Database=healthcare_erp_inventory;Username=postgres;Password=postgres
      ConnectionStrings__Procurement: Host=postgres;Port=5432;Database=healthcare_erp_procurement;Username=postgres;Password=postgres
    ports:
      - "5080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "dotnet", "--info"]
      interval: 5s
      timeout: 5s
      retries: 20

  frontend:
    profiles: ["ui"]
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    depends_on:
      api:
        condition: service_healthy

volumes:
  postgres-data:
